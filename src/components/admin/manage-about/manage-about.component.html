<div class="px-4 sm:px-0">
  <h2 class="text-2xl font-bold tracking-tight text-gray-900">{{ t()('manageAbout.title') }}</h2>
  
  <div class="my-4">
    <label class="block text-sm font-medium text-gray-700 mb-2">Editing Language:</label>
    <span class="isolate inline-flex rounded-md shadow-sm">
      @for (lang of translationService.languages; track lang.code; let first = $first; let last = $last) {
        <button type="button"
                (click)="setEditingLanguage(lang.code)"
                class="relative inline-flex items-center px-4 py-2 text-sm font-semibold ring-1 ring-inset ring-gray-300 focus:z-10 transition-colors"
                [class.rounded-l-md]="first"
                [class.rounded-r-md]="last"
                [class.-ml-px]="!first"
                [class.bg-indigo-600]="editingLanguage() === lang.code"
                [class.text-white]="editingLanguage() === lang.code"
                [class.bg-white]="editingLanguage() !== lang.code"
                [class.text-gray-900]="editingLanguage() !== lang.code"
                [class.hover:bg-gray-50]="editingLanguage() !== lang.code">
          {{ lang.flag }} {{ lang.label }}
        </button>
      }
    </span>
  </div>

  <div class="mt-4 p-6 bg-white shadow-lg rounded-lg">
    <form [formGroup]="aboutForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Image URL / Upload -->
      <div>
        <label for="imageUrl" class="block text-sm font-medium text-gray-700">{{ t()('manageAbout.imageUrl') }}</label>
        <div class="mt-2 flex items-center space-x-4">
            <input type="url" id="imageUrl" formControlName="imageUrl" [placeholder]="t()('manageAbout.pasteUrl')" class="flex-grow block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6">
            <span class="text-sm text-gray-500">{{ t()('manageAbout.or') }}</span>
            <label for="about-upload" class="cursor-pointer px-4 py-2 text-sm rounded-md border border-gray-300 bg-white font-semibold text-gray-700 hover:bg-gray-50 transition-colors whitespace-nowrap">
                <span>{{ t()('manageAbout.uploadImage') }}</span>
                <input id="about-upload" name="about-upload" type="file" class="sr-only" (change)="onFileSelected($event)" accept="image/png, image/jpeg, image/gif, image/webp">
            </label>
        </div>
        @if (aboutForm.get('imageUrl')?.value) {
          <div class="mt-4">
            <p class="text-sm font-medium text-gray-600 mb-2">{{ t()('manageAbout.imagePreview') }}</p>
            <div class="w-full max-w-md aspect-[16/9] bg-gray-100 rounded-md overflow-hidden border">
                <img [src]="aboutForm.get('imageUrl')?.value" alt="Banner preview" class="w-full h-full object-cover" referrerpolicy="no-referrer">
            </div>
          </div>
        }
      </div>

      <!-- Description -->
      <div>
        <label for="description" class="block text-sm font-medium text-gray-700">{{ t()('manageAbout.description') }}</label>
        <p class="text-xs text-gray-500 mb-1">{{ t()('manageAbout.descriptionHelp') }}</p>
        <textarea id="description" formControlName="description" rows="10" class="mt-1 block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"></textarea>
      </div>

      <!-- Submit button -->
      <div class="flex justify-end pt-4 border-t border-gray-200">
        <button type="submit" [disabled]="aboutForm.invalid" class="px-6 py-2 rounded-md text-white bg-indigo-600 hover:bg-indigo-700 font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:bg-indigo-300">
          {{ t()('manageAbout.saveButton') }}
        </button>
      </div>
    </form>
  </div>
</div>
