<div class="fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center transition-opacity" (click)="onCancel()">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-md m-4 p-6 sm:p-8 transform transition-transform" (click)="$event.stopPropagation()">
    <div class="sm:flex sm:items-start">
      <div class="flex-shrink-0 mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 sm:mx-0 sm:h-10 sm:w-10">
        <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
        </svg>
      </div>
      <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
        <h3 class="text-lg font-semibold leading-6 text-gray-900">{{ t()('confirmationModal.title') }}</h3>
        <div class="mt-2">
          <p class="text-sm text-gray-600">{{ message() }}</p>
        </div>
      </div>
    </div>
    <div class="mt-6 flex flex-col-reverse sm:flex-row sm:justify-end gap-3">
      <button (click)="onCancel()" type="button" class="w-full inline-flex justify-center rounded-md bg-white px-4 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 sm:w-auto">
        {{ cancelButtonText() || t()('confirmationModal.buttons.cancel') }}
      </button>
      <button (click)="onConfirm()" type="button" class="w-full inline-flex justify-center rounded-md bg-red-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-red-500 sm:w-auto">
        {{ confirmButtonText() || t()('confirmationModal.buttons.confirm') }}
      </button>
    </div>
  </div>
</div>
